// State
let uploadData = []; // from Data SDK
let currentFilter = 'all';
let searchTerm = '';

const defaultConfig = {
  page_title: "ระบบอัปโหลดไฟล์ อปท.",
  page_subtitle: "จังหวัดสุพรรณบุรี",
  background_color: "#f0f7ff",
  surface_color: "#ffffff",
  text_color: "#1e3a5f",
  primary_action_color: "#2196F3",
  secondary_action_color: "#64b5f6"
};

function getUploadStatus(orgId) {
  return uploadData.find(d => d.org_id === orgId);
}

function renderTable() {
  const tbody = document.getElementById('org-table');
  const noResults = document.getElementById('no-results');
  const filtered = ORGS.filter(o => {
    const matchSearch = !searchTerm || o.n.includes(searchTerm) || o.d.includes(searchTerm);
    const status = getUploadStatus(o.id);
    const matchFilter = currentFilter === 'all' || (currentFilter === 'done' && status) || (currentFilter === 'pending' && !status);
    return matchSearch && matchFilter;
  });

  // Selective update
  const existingRows = new Map([...tbody.querySelectorAll('tr[data-id]')].map(r => [r.dataset.id, r]));
  const newIds = new Set(filtered.map(o => o.id));

  // Remove rows not in filtered
  existingRows.forEach((row, id) => { if (!newIds.has(id)) row.remove(); });

  let prevRow = null;
  filtered.forEach((o, idx) => {
    const status = getUploadStatus(o.id);
    const existing = existingRows.get(o.id);
    if (existing) {
      updateRow(existing, o, idx, status);
      prevRow = existing;
    } else {
      const row = createRow(o, idx, status);
      if (prevRow && prevRow.nextSibling) {
        tbody.insertBefore(row, prevRow.nextSibling);
      } else if (!prevRow) {
        tbody.prepend(row);
      } else {
        tbody.appendChild(row);
      }
      prevRow = row;
    }
  });

  noResults.classList.toggle('hidden', filtered.length > 0);
  updateStats();
  lucide.createIcons();
}

function createRow(o, idx, status) {
  const tr = document.createElement('tr');
  tr.dataset.id = o.id;
  tr.className = `animate-row border-b border-gray-100 hover:bg-pastel-50/50 transition ${idx % 2 === 0 ? 'bg-white/40' : 'bg-white/20'}`;
  tr.style.animationDelay = `${Math.min(idx * 15, 300)}ms`;
  fillRow(tr, o, idx, status);
  return tr;
}

function updateRow(tr, o, idx, status) {
  fillRow(tr, o, idx, status);
}

function fillRow(tr, o, idx, status) {
  const uploaded = !!status;
  const dateStr = status ? new Date(status.uploaded_at).toLocaleDateString('th-TH', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  tr.innerHTML = `
    <td class="py-3 px-4 text-gray-400 font-medium">${idx+1}</td>
    <td class="py-3 px-4"><span class="text-xs bg-pastel-100 text-pastel-500 px-2 py-0.5 rounded-full font-medium">${o.d}</span></td>
    <td class="py-3 px-4 font-medium text-gray-700">${o.n}</td>
    <td class="py-3 px-4 text-center">
      ${uploaded
        ? `<span class="inline-flex items-center gap-1 bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full text-xs font-semibold"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i>อัปแล้ว</span><br><span class="text-[10px] text-gray-400">${dateStr}</span>`
        : `<span class="inline-flex items-center gap-1 bg-red-100 text-red-600 px-2.5 py-1 rounded-full text-xs font-semibold status-pulse"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i>ยังไม่อัป</span>`
      }
    </td>
    <td class="py-3 px-4 text-center">
      <div class="flex items-center justify-center gap-1.5">
        ${!uploaded
          ? `<button onclick="markUploaded('${o.id}')" class="inline-flex items-center gap-1 bg-pastel-500 hover:bg-pastel-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition shadow-sm"><i data-lucide="upload" class="w-3.5 h-3.5"></i>อัปโหลด</button>`
          : `<button onclick="unmarkUploaded('${o.id}')" class="inline-flex items-center gap-1 bg-gray-200 hover:bg-gray-300 text-gray-600 px-3 py-1.5 rounded-lg text-xs font-medium transition"><i data-lucide="undo-2" class="w-3.5 h-3.5"></i>ยกเลิก</button>`
        }
        <a href="${DRIVE_URL}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 bg-white hover:bg-gray-50 text-gray-500 border border-gray-200 px-2.5 py-1.5 rounded-lg text-xs transition" title="เปิด Google Drive">
          <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
        </a>
      </div>
    </td>
  `;
}

function updateStats() {
  const done = ORGS.filter(o => getUploadStatus(o.id)).length;
  const pending = ORGS.length - done;
  const pct = Math.round((done / ORGS.length) * 100);
  document.getElementById('stat-total').textContent = ORGS.length;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

function setFilter(f) {
  currentFilter = f;
  ['all','done','pending'].forEach(k => {
    const btn = document.getElementById('filter-' + k);
    if (k === f) {
      btn.className = 'px-4 py-2 rounded-xl text-sm font-medium bg-pastel-500 text-white shadow transition';
    } else {
      btn.className = 'px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-500 border border-gray-200 hover:bg-gray-50 transition';
    }
  });
  renderTable();
}

async function markUploaded(orgId) {
  if (uploadData.length >= 999) {
    showToast('⚠️ ถึงขีดจำกัดแล้ว ไม่สามารถเพิ่มได้');
    return;
  }
  // Open Drive folder
  window.open(DRIVE_URL, '_blank');
  // Mark as uploaded
  const result = await window.dataSdk.create({
    org_id: orgId,
    uploaded: true,
    uploaded_at: new Date().toISOString()
  });
  if (result.isOk) {
    showToast('✅ บันทึกสถานะอัปโหลดแล้ว');
  } else {
    showToast('❌ เกิดข้อผิดพลาด กรุณาลองใหม่');
  }
}

async function unmarkUploaded(orgId) {
  const record = uploadData.find(d => d.org_id === orgId);
  if (!record) return;
  const result = await window.dataSdk.delete(record);
  if (result.isOk) {
    showToast('↩️ ยกเลิกสถานะแล้ว');
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 2500);
}

// Search
document.getElementById('search-input').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim();
  renderTable();
});

// Data SDK
const dataHandler = {
  onDataChanged(data) {
    uploadData = data;
    renderTable();
  }
};

// Element SDK
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    document.getElementById('main-title').textContent = config.page_title || defaultConfig.page_title;
    document.getElementById('main-subtitle').textContent = config.page_subtitle || defaultConfig.page_subtitle;
    // Colors
    const bg = config.background_color || defaultConfig.background_color;
    document.getElementById('app').style.background = `linear-gradient(135deg, ${bg} 0%, #f0f7ff 30%, #fff 60%, ${bg} 100%)`;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({background_color:v}); }},
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v}); }},
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({primary_action_color:v}); }},
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({secondary_action_color:v}); }},
    ],
    borderables: [],
    fontEditable: undefined,
    fontSizeable: undefined
  }),
  mapToEditPanelValues: (config) => new Map([
    ["page_title", config.page_title || defaultConfig.page_title],
    ["page_subtitle", config.page_subtitle || defaultConfig.page_subtitle]
  ])
});

(async () => {
  const r = await window.dataSdk.init(dataHandler);
  if (!r.isOk) console.error("Data SDK init failed");
  renderTable();
  lucide.createIcons();
})();
</script>
