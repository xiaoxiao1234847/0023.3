<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามการรายงานคำสั่ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f9ff; }
        .pastel-blue { background-color: #A3D8F4; }
        .status-red { background-color: #FFB3B3; color: #D8000C; }
        .status-green { background-color: #C1E1C1; color: #285430; }
    </style>
</head>
<body>

    <header class="pastel-blue p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold text-gray-800">ระบบติดตามการส่งไฟล์ อปท. (127 แห่ง)</h1>
        <p class="text-gray-600">หน่วยงานราชการส่วนกลาง</p>
    </header>

    <main class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-400">
                <p class="text-sm text-gray-500">ทั้งหมด</p>
                <p class="text-2xl font-bold">127 แห่ง</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-green-400">
                <p class="text-sm text-gray-500">อัปโหลดแล้ว</p>
                <p id="uploaded-count" class="text-2xl font-bold text-green-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-red-400">
                <p class="text-sm text-gray-500">ยังไม่อัปโหลด</p>
                <p id="pending-count" class="text-2xl font-bold text-red-600">127</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr class="bg-blue-50">
                        <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">ลำดับ</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">ชื่อ อปท.</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">สถานะ</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="lao-list">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // จำลองข้อมูล อปท. 127 แห่ง
        const laoData = Array.from({ length: 127 }, (_, i) => ({
            id: i + 1,
            name: `องค์การบริหารส่วนตำบล ตัวอย่างที่ ${i + 1}`,
            isUploaded: Math.random() > 0.5 // สุ่มสถานะเพื่อตัวอย่าง
        }));

        const listContainer = document.getElementById('lao-list');
        let uploaded = 0;

        laoData.forEach(lao => {
            if(lao.isUploaded) uploaded++;
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">${lao.id}</td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">${lao.name}</td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <span class="px-3 py-1 rounded-full text-xs ${lao.isUploaded ? 'status-green' : 'status-red'}">
                        ${lao.isUploaded ? 'อัปโหลดแล้ว' : 'ยังไม่อัปโหลด'}
                    </span>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <button class="text-blue-500 hover:text-blue-800 font-semibold">อัปโหลดไฟล์</button>
                </td>
            `;
            listContainer.appendChild(row);
        });

        document.getElementById('uploaded-count').innerText = uploaded;
        document.getElementById('pending-count').innerText = 127 - uploaded;
    </script>
</body>
</html>
