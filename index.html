  {id:"113",district:"สองพี่น้อง",name:"อบต.เนินพระปรางค์เหนือ"},
  {id:"114",district:"อู่ทอง",name:"อบต.หนองยายดา"},
  {id:"115",district:"อู่ทอง",name:"อบต.ดอนพรหม"},
  {id:"116",district:"สามชุก",name:"อบต.หนองสาหร่าย"},
  {id:"117",district:"ด่านช้าง",name:"อบต.หนองหญ้าปล้อง"},
  {id:"118",district:"ดอนเจดีย์",name:"อบต.สระศรีเจริญ"},
  {id:"119",district:"ศรีประจันต์",name:"อบต.วังหว้าเหนือ"},
  {id:"120",district:"เดิมบางนางบวช",name:"อบต.สระกร่าง"},
  {id:"121",district:"หนองหญ้าไซ",name:"อบต.หนองโพธิ์เหนือ"},
  {id:"122",district:"เมืองสุพรรณบุรี",name:"อบต.สนามคลี"},
  {id:"123",district:"สองพี่น้อง",name:"อบต.วัดดาว"},
  {id:"124",district:"บางปลาม้า",name:"อบต.สำเภาล่ม"},
  {id:"125",district:"อู่ทอง",name:"อบต.ดอนมะเกลือ"},
  {id:"126",district:"ด่านช้าง",name:"อบต.หนองมะค่า"},
  {id:"127",district:"สามชุก",name:"อบต.หนองแปน"}
];

// === STATE ===
let uploadRecords = []; // from Data SDK
let currentFilter = 'all';
let selectedFile = null;

// === DEFAULT CONFIG ===
const defaultConfig = {
  page_title: 'ระบบติดตามการส่งไฟล์',
  subtitle: 'องค์กรปกครองส่วนท้องถิ่นจังหวัดสุพรรณบุรี',
  background_color: '#f0f7ff',
  surface_color: '#ffffff',
  text_color: '#374151',
  primary_action_color: '#3aa5ff',
  secondary_action_color: '#64748b'
};

// === ELEMENT SDK ===
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const c = key => config[key] || defaultConfig[key];
    document.getElementById('page-title').textContent = c('page_title');
    document.getElementById('page-subtitle').textContent = c('subtitle');
    document.body.style.backgroundColor = c('background_color');
    document.querySelectorAll('.bg-white, [data-surface]').forEach(el => {
      if (el.closest('#confirm-modal') || el.closest('#toast-container')) return;
      el.style.backgroundColor = c('surface_color');
    });
    document.body.style.color = c('text_color');
    document.getElementById('upload-btn').style.backgroundColor =
      document.getElementById('upload-btn').disabled ? '' : c('primary_action_color');
    document.querySelectorAll('[data-filter-active]').forEach(el => {
      el.style.backgroundColor = c('primary_action_color');
    });
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({background_color:v}); }},
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v}); }},
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({primary_action_color:v}); }},
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({secondary_action_color:v}); }}
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family || 'Noto Sans Thai',
      set: v => { config.font_family = v; window.elementSdk.setConfig({font_family:v}); document.querySelectorAll('*').forEach(el => el.style.fontFamily = v + ', Noto Sans Thai, sans-serif'); }
    },
    fontSizeable: {
      get: () => config.font_size || defaultConfig.font_size || 14,
      set: v => { config.font_size = v; window.elementSdk.setConfig({font_size:v}); document.body.style.fontSize = v + 'px'; }
    }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['page_title', config.page_title || defaultConfig.page_title],
    ['subtitle', config.subtitle || defaultConfig.subtitle]
  ])
});

// === DATA SDK ===
const dataHandler = {
  onDataChanged(data) {
    uploadRecords = data;
    updateStats();
    renderTable();
    populateSelect();
  }
};

(async () => {
  const r = await window.dataSdk.init(dataHandler);
  if (!r.isOk) console.error('Data SDK init failed');
  populateSelect();
  renderTable();
  lucide.createIcons();
})();

// === FUNCTIONS ===
function getOrgStatus(orgId) {
  return uploadRecords.find(r => r.org_id === orgId);
}

function updateStats() {
  const done = ALL_ORGS.filter(o => getOrgStatus(o.id)).length;
  const pending = ALL_ORGS.length - done;
  const pct = Math.round((done / ALL_ORGS.length) * 100);
  document.getElementById('count-done').textContent = done;
  document.getElementById('count-pending').textContent = pending;
  document.getElementById('progress-text').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
}

function populateSelect() {
  const sel = document.getElementById('org-select');
  const curVal = sel.value;
  const districts = [...new Set(ALL_ORGS.map(o => o.district))];
  let html = '<option value="">-- เลือกหน่วยงาน --</option>';
  districts.forEach(d => {
    html += `<optgroup label="${d}">`;
    ALL_ORGS.filter(o => o.district === d).forEach(o => {
      const status = getOrgStatus(o.id);
      const mark = status ? ' ✅' : ' 🔴';
      html += `<option value="${o.id}">${o.name}${mark}</option>`;
    });
    html += '</optgroup>';
  });
  sel.innerHTML = html;
  sel.value = curVal;
  updateUploadBtn();
}

function handleFileSelect(input) {
  if (input.files.length) {
    selectedFile = input.files[0];
    document.getElementById('file-label').textContent = selectedFile.name;
    document.getElementById('file-label').classList.remove('text-gray-400');
    document.getElementById('file-label').classList.add('text-gray-700');
  }
  updateUploadBtn();
}

function updateUploadBtn() {
  const sel = document.getElementById('org-select').value;
  document.getElementById('upload-btn').disabled = !(sel && selectedFile);
}

document.getElementById('org-select').addEventListener('change', updateUploadBtn);

async function handleUpload() {
  const orgId = document.getElementById('org-select').value;
  if (!orgId || !selectedFile) return;
  const org = ALL_ORGS.find(o => o.id === orgId);
  const existing = getOrgStatus(orgId);
  const btn = document.getElementById('upload-btn');
  const btnText = document.getElementById('upload-btn-text');

  btn.disabled = true;
  btnText.textContent = 'กำลังบันทึก...';

  if (uploadRecords.length >= 999 && !existing) {
    showToast('ข้อมูลเต็มแล้ว (999 รายการ) กรุณาลบบางรายการก่อน', 'error');
    btn.disabled = false;
    btnText.textContent = 'อัปโหลด';
    return;
  }

  let result;
  if (existing) {
    result = await window.dataSdk.update({
      ...existing,
      uploaded: true,
      upload_date: new Date().toISOString(),
      file_name: selectedFile.name
    });
  } else {
    result = await window.dataSdk.create({
      org_id: orgId,
      org_name: org.name,
      uploaded: true,
      upload_date: new Date().toISOString(),
      file_name: selectedFile.name
    });
  }

  if (result.isOk) {
    showToast(`บันทึกสถานะ "${org.name}" เรียบร้อยแล้ว`, 'success');
  } else {
    showToast('เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
  }

  selectedFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('file-label').textContent = 'คลิกเพื่อเลือกไฟล์...';
  document.getElementById('file-label').classList.add('text-gray-400');
  document.getElementById('file-label').classList.remove('text-gray-700');
  btn.disabled = false;
  btnText.textContent = 'อัปโหลด';
  updateUploadBtn();
}

function setFilter(f) {
  currentFilter = f;
  ['all','done','pending'].forEach(key => {
    const el = document.getElementById('filter-' + key);
    if (key === f) {
      el.className = 'px-3 py-2 rounded-xl text-sm font-medium bg-pastel-400 text-white transition-all';
      el.setAttribute('data-filter-active','');
    } else {
      el.className = 'px-3 py-2 rounded-xl text-sm font-medium bg-white text-gray-500 border border-gray-200 hover:bg-gray-50 transition-all';
      el.removeAttribute('data-filter-active');
    }
  });
  renderTable();
}

function renderTable() {
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const tbody = document.getElementById('org-table');
  let filtered = ALL_ORGS;
  if (search) filtered = filtered.filter(o => o.name.includes(search) || o.district.includes(search));
  if (currentFilter === 'done') filtered = filtered.filter(o => getOrgStatus(o.id));
  if (currentFilter === 'pending') filtered = filtered.filter(o => !getOrgStatus(o.id));

  document.getElementById('no-results').classList.toggle('hidden', filtered.length > 0);

  const existingRows = new Map([...tbody.children].map(el => [el.dataset.orgId, el]));
  const newIds = new Set(filtered.map(o => o.id));

  // Remove rows no longer shown
  existingRows.forEach((el, id) => { if (!newIds.has(id)) el.remove(); });

  let prevEl = null;
  filtered.forEach((o, i) => {
    const status = getOrgStatus(o.id);
    let row = existingRows.get(o.id);
    if (row) {
      // Update in place
      row.children[0].textContent = i + 1;
      row.children[3].innerHTML = status
        ? '<span class="inline-flex items-center gap-1 text-green-600 bg-green-50 px-2 py-0.5 rounded-full text-xs font-medium"><span class="status-dot bg-green-500"></span>ส่งแล้ว</span>'
        : '<span class="inline-flex items-center gap-1 text-red-500 bg-red-50 px-2 py-0.5 rounded-full text-xs font-medium"><span class="status-dot bg-red-400"></span>ยังไม่ส่ง</span>';
      row.children[4].textContent = status ? formatDate(status.upload_date) : '-';
    } else {
      row = document.createElement('tr');
      row.dataset.orgId = o.id;
      row.className = 'border-t border-gray-50 hover:bg-pastel-50/50 transition-colors row-animate';
      row.innerHTML = `
        <td class="px-4 py-2.5 text-gray-400">${i + 1}</td>
        <td class="px-4 py-2.5 text-gray-500 text-xs">${o.district}</td>
        <td class="px-4 py-2.5 font-medium text-gray-700">${o.name}</td>
        <td class="px-4 py-2.5 text-center">${status
          ? '<span class="inline-flex items-center gap-1 text-green-600 bg-green-50 px-2 py-0.5 rounded-full text-xs font-medium"><span class="status-dot bg-green-500"></span>ส่งแล้ว</span>'
          : '<span class="inline-flex items-center gap-1 text-red-500 bg-red-50 px-2 py-0.5 rounded-full text-xs font-medium"><span class="status-dot bg-red-400"></span>ยังไม่ส่ง</span>'
        }</td>
        <td class="px-4 py-2.5 text-gray-400 text-xs">${status ? formatDate(status.upload_date) : '-'}</td>
      `;
    }
    if (prevEl) {
      prevEl.after(row);
    } else {
      tbody.prepend(row);
    }
    prevEl = row;
  });

  lucide.createIcons();
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function showToast(msg, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  const colors = type === 'success' ? 'bg-green-500' : 'bg-red-500';
  toast.className = `${colors} text-white px-4 py-3 rounded-xl shadow-lg text-sm flex items-center gap-2 toast-enter`;
  const icon = type === 'success' ? 'check-circle' : 'alert-circle';
  toast.innerHTML = `<i data-lucide="${icon}" style="width:16px;height:16px;"></i> ${msg}`;
  container.appendChild(toast);
  lucide.createIcons();
  setTimeout(() => {
    toast.classList.remove('toast-enter');
    toast.classList.add('toast-exit');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.add('hidden');
  document.getElementById('confirm-modal').classList.remove('flex');
}
