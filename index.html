<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ระบบอัปโหลดเอกสาร อปท.</title>

<style>
body {
  font-family: "Sarabun", sans-serif;
  background: #eaf6ff;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #4da6ff;
}

.search-box {
  margin-bottom: 15px;
  text-align: center;
}

input {
  padding: 8px;
  width: 300px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  text-align: center;
}

th {
  background: #b3e0ff;
}

.status-red {
  background: #ffcccc;
}

.status-green {
  background: #ccffcc;
}

button {
  background: #66ccff;
  border: none;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<h2>ระบบอัปโหลดเอกสาร อปท. จังหวัดสุพรรณบุรี</h2>

<div class="search-box">
  <input type="text" id="search" placeholder="ค้นหาหน่วยงาน...">
</div>

<table id="table">
  <thead>
    <tr>
      <th>ลำดับ</th>
      <th>ชื่อหน่วยงาน</th>
      <th>อัปโหลด</th>
      <th>สถานะ</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let orgs = [];
let statusData = {};

function loadData() {
  google.script.run.withSuccessHandler(function(data){
    orgs = data;
    renderTable();
  }).getOrganizations();

  google.script.run.withSuccessHandler(function(data){
    statusData = data;
    renderTable();
  }).getStatus();
}

function renderTable() {
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  const keyword = document.getElementById("search").value;

  orgs.forEach((org, i) => {
    if (!org.includes(keyword)) return;

    let uploaded = statusData[org + ".pdf"];

    let row = `
      <tr class="${uploaded ? 'status-green' : 'status-red'}">
        <td>${i+1}</td>
        <td>${org}</td>
        <td>
          <input type="file" onchange="uploadFile(event,'${org}')">
        </td>
        <td>${uploaded ? "อัปโหลดแล้ว" : "ยังไม่อัปโหลด"}</td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}

function uploadFile(e, orgName) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function() {
    const base64 = reader.result.split(",")[1];

    google.script.run.withSuccessHandler(function(){
      alert("อัปโหลดสำเร็จ");
      loadData();
    }).uploadFile(orgName, base64, file.type);
  };

  reader.readAsDataURL(file);
}

document.getElementById("search").addEventListener("keyup", renderTable);

loadData();
</script>

</body>
</html>
